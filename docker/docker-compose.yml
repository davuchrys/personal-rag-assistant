# Explicit project name so the volume/network prefix stays stable no matter
# where compose is invoked from (folder-derived naming would call it "docker").
name: personal-rag-assistant

services:
  rag-assistant:
    build:
      # Build context is the repo root so COPY picks up the app source;
      # .dockerignore therefore also lives at the repo root.
      context: ..
      dockerfile: docker/Dockerfile
    container_name: personal-rag-assistant
    ports:
      - "8501:8501"
    # API keys and backend selection live in .env at the repo root (copy
    # .env.example, never baked into the image).
    env_file:
      - ../.env
    environment:
      # Inside the container "localhost" is the container itself, so when
      # USE_OLLAMA=true the app must reach Ollama on the host machine instead.
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    extra_hosts:
      # Makes host.docker.internal resolve on Linux too (no-op on Docker Desktop).
      - "host.docker.internal:host-gateway"
    volumes:
      # Indexed documents (ChromaDB) and app data (chats, sessions, logs)
      # survive container rebuilds/restarts.
      - vector_db:/app/vector_db
      - app_data:/app/data
    restart: unless-stopped

volumes:
  vector_db:
  app_data:
